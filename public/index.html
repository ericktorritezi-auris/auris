<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#8A6010"/>
<link rel="icon" href="/favicon.ico" sizes="any"/>
<link rel="icon" href="/favicon-32.png" type="image/png"/>
<link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Auris — Espaço Terapêutico</title>
<style>
  :root {
    --gold: #8A6010;
    --gold-light: #F5D68A;
    --gold-mid: #C9920A;
    --gold-pale: #fdf8f0;
    --gold-border: #e0d4b8;
    --chat-bg: #f7f2e8;
    --app-bg: #fdfaf4;
    --text-dark: #2c2c2a;
    --text-mid: #5a5040;
    --text-muted: #a09070;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--chat-bg);
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    background: var(--app-bg);
    box-shadow: 0 0 40px rgba(0,0,0,0.08);
  }

  /* Header */
  #header {
    background: var(--gold);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    padding-top: max(14px, env(safe-area-inset-top));
  }

  #avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--gold-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 600; color: #5A3C08;
    flex-shrink: 0;
  }

  #header-info { flex: 1; }
  #header-name { font-size: 16px; font-weight: 600; color: #FFF8E7; }
  #header-sub { font-size: 11px; color: #F0C96A; margin-top: 2px; }

  #status {
    display: flex; align-items: center; gap: 5px;
  }
  #status-dot { width: 7px; height: 7px; border-radius: 50%; background: #7FE0A0; }
  #status-txt { font-size: 11px; color: #F0C96A; }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: var(--chat-bg);
    -webkit-overflow-scrolling: touch;
  }

  /* Bot bubble */
  .bot-wrap {
    align-self: flex-start;
    max-width: 88%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .bot-bubble {
    background: white;
    border: 0.5px solid var(--gold-border);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    padding: 13px 16px;
    font-size: 15px;
    line-height: 1.8;
    color: var(--text-dark);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .bot-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--gold);
    margin-bottom: 7px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .bot-name img {
    height: 13px;
    width: auto;
    opacity: 0.75;
  }

  .reflection {
    font-style: italic;
    color: var(--text-mid);
    font-size: 14.5px;
    border-left: 2px solid var(--gold-mid);
    padding-left: 11px;
    margin-bottom: 11px;
    line-height: 1.8;
  }

  .question {
    font-weight: 600;
    font-size: 15px;
    color: var(--text-dark);
    line-height: 1.6;
  }

  /* Options */
  .opts {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .opt-btn {
    background: white;
    border: 0.5px solid var(--gold);
    color: var(--gold);
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 13.5px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    line-height: 1.4;
    -webkit-appearance: none;
  }

  .opt-btn:active { background: var(--gold); color: #FFF8E7; transform: scale(0.97); }
  .opt-btn.used { background: #f0ead8; color: #b09060; border-color: #c8b880; pointer-events: none; }

  /* User bubble */
  .user-bubble {
    align-self: flex-end;
    max-width: 82%;
    background: var(--gold);
    color: #FFF8E7;
    border-radius: 18px;
    border-bottom-right-radius: 4px;
    padding: 12px 16px;
    font-size: 15px;
    line-height: 1.7;
  }

  /* Typing */
  .typing {
    align-self: flex-start;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 13px 16px;
    background: white;
    border: 0.5px solid var(--gold-border);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.4;
    animation: bl 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bl { 0%,80%,100%{opacity:.4} 40%{opacity:1} }

  /* Input area */
  #input-area {
    padding: 10px 12px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    border-top: 0.5px solid var(--gold-border);
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: white;
    flex-shrink: 0;
  }

  #inp {
    flex: 1;
    border: 0.5px solid #c4aa70;
    border-radius: 22px;
    padding: 11px 16px;
    font-size: 15px;
    font-family: inherit;
    background: var(--gold-pale);
    color: var(--text-dark);
    outline: none;
    resize: none;
    max-height: 100px;
    line-height: 1.5;
    -webkit-appearance: none;
  }

  #inp:focus { border-color: var(--gold); }
  #inp::placeholder { color: #b0a080; }

  #send-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--gold);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
    -webkit-appearance: none;
  }

  #send-btn:active { transform: scale(0.93); background: #6A4808; }
  #send-btn:disabled { background: #c4a060; }

  /* Footer */
  #footer {
    text-align: center;
    padding: 6px;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--chat-bg);
    border-top: 0.5px solid var(--gold-border);
    flex-shrink: 0;
  }

  /* Scroll anchor */
  #bottom { height: 1px; }
</style>
</head>

function scrollDown() {

function parseMsg(text) {
  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  let refl = [], question = "", opts = [];
  for (const l of lines) {
    if (l.startsWith("✦")) question = l.slice(1).trim();
    else if (l.startsWith("→")) opts.push(l.slice(1).trim());
    else if (!question) refl.push(l);
  }
  return { refl: refl.join(" "), question, opts };
}

}

    const row = document.createElement("div");
    row.className = "opts";
    allOptRows.push(row);

    opts.forEach(o => {
      const btn = document.createElement("button");
      btn.className = "opt-btn";
      btn.textContent = o;
      btn.onclick = () => chooseOpt(o, row);
      row.appendChild(btn);
    });
    wrap.appendChild(row);
  }

  msgs.insertBefore(wrap, bottom);
  scrollDown();
}

function showTyping() {
  const t = document.createElement("div");
  t.className = "typing";
  t.id = "typing";
  t.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  msgs.insertBefore(t, bottom);
  scrollDown();
}

function hideTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

function lockAllOpts() {
  allOptRows.forEach(row => {
    row.querySelectorAll(".opt-btn").forEach(b => b.classList.add("used"));
  });
}

async function callAPI(userText) {
  lockAllOpts();
  history.push({ role: "user", content: userText });
  loading = true;
  sendBtn.disabled = true;
  inp.disabled = true;
  document.getElementById("status-txt").textContent = "digitando...";

  showTyping();

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history })
    });

    const data = await res.json();
    if (!data.reply) throw new Error("sem resposta");

    history.push({ role: "assistant", content: data.reply });
    hideTyping();
    addBotBubble(data.reply);
  } catch (e) {
    hideTyping();
    const fallback = `Algo interrompeu nosso encontro por um instante. Como a maré que sempre retorna, estamos aqui de novo.\n\n✦ Como você gostaria de continuar?\n\n→ Retomar de onde paramos\n→ Começar um novo tema\n→ Escrever livremente`;
    history.push({ role: "assistant", content: fallback });
    addBotBubble(fallback);
  }

  loading = false;
  sendBtn.disabled = false;
  inp.disabled = false;
  document.getElementById("status-txt").textContent = "online";
  inp.focus();
}

function chooseOpt(opt, row) {
  if (loading) return;
  row.querySelectorAll(".opt-btn").forEach(b => b.classList.add("used"));
  addUserBubble(opt);
  callAPI(opt);
}

function send() {
  const v = inp.value.trim();
  if (!v || loading) return;
  inp.value = "";
  inp.style.height = "auto";
  addUserBubble(v);
  callAPI(v);
}

// Auto-resize textarea
inp.addEventListener("input", () => {
  inp.style.height = "auto";
  inp.style.height = Math.min(inp.scrollHeight, 100) + "px";
});

inp.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

// Init
setTimeout(() => {
  addBotBubble(ABERTURA);
}, 600);
</script>
</body>
